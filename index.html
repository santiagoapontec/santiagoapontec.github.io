<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Santiago Aponte</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f5f0e8;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: #1a1a1a;
            padding: 60px 40px;
        }

        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 60px;
            text-align: center;
            padding-top: 60px;
        }

        .frame-label {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .today-date {
            font-size: 22px;
            font-style: italic;
            color: #aaa;
        }

        .counter-heading {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .counter-time {
            font-size: 22px;
            font-style: italic;
            color: #aaa;
        }

        .jump-heading {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .jump-to {
            font-size: 22px;
            font-style: italic;
            color: #aaa;
            margin-bottom: 24px;
        }

        .jump-links {
            display: flex;
            gap: 48px;
            justify-content: center;
        }

        .jump-links a {
            font-size: 16px;
            color: #1a1a1a;
            text-decoration: underline;
            text-underline-offset: 4px;
        }

        .jump-links a:hover {
            color: #888;
        }

        footer {
            text-align: center;
            font-size: 13px;
            color: #aaa;
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-top: 60px;
        }

        footer a {
            color: #aaa;
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        .stickman-counter {
            text-align: center;
            font-size: 11px;
            font-style: italic;
            color: #bbb;
            margin-top: 24px;
            margin-bottom: 60px;
        }

    </style>

  </head>
  <body>
    <main>

        <section class="today">
            <p class="frame-label">Today is</p>
            <p class="today-date" id="today-date"></p>
        </section>

        <section class="counter">
            <p class="counter-heading">This website has been active for</p>
            <p class="counter-time" id="counter-time"></p>
        </section>

        <section class="jump">
            <p class="jump-heading">Feel free to jump</p>
            <p class="jump-to">to</p>
            <div class="jump-links">
                <a href="writing.html">Writing</a>
                <a href="learning.html">Learning</a>
                <a href="notes.html">Notes</a>
                <a href="daily.html">Daily</a>
            </div>
        </section>

    </main>

    <footer>
        <p>By Santiago Aponte</p>
        <a href="mailto:placeholder@email.com">Contact</a>
    </footer>

    <p class="stickman-counter" id="stickman-counter"></p>

    <script>
        var launchDate = new Date('2026-03-11T22:23:00');

        function formatToday() {
        var now = new Date();
        var m = now.getMonth() + 1;
        var d = now.getDate();
        var y = now.getFullYear();
        document.getElementById('today-date').textContent = m + '/' + d + '/' + y;
        }

        function updateCounter() {
        var now = new Date();
        var diff = now - launchDate;

        if (diff < 0) {
            document.getElementById('counter-time').textContent = 'not yet launched...';
            return;
        }

        var seconds = Math.floor(diff / 1000) % 60;
        var minutes = Math.floor(diff / (1000 * 60)) % 60;
        var hours = Math.floor(diff / (1000 * 60 * 60)) % 24;
        var days = Math.floor(diff / (1000 * 60 * 60 * 24));

        document.getElementById('counter-time').textContent =
            days + ' days, ' + hours + ' hours, ' + minutes + ' minutes, and ' + seconds + ' seconds...';
        }

        formatToday();
        updateCounter();
        setInterval(updateCounter, 1000);
    </script>

    <div class="stickman-stage">
        <img id="stickman" src="images/run1.png" style="position:fixed; bottom:0px; left:0px; width:35px; height:45px; object-fit:contain;">
    </div>

    <script>
        // Sprite cycling
        var frame = 1;
        var s = document.getElementById('stickman');
        setInterval(function() {
            frame = (frame < 1 || frame >= 12) ? 1 : frame + 1;
            s.src = 'images/run' + frame + '.png';
        }, 80);

        // Movement
        var px = 0;
        function moveTick() {
            px += 0.55;
            if (px > window.innerWidth) px = -35;
            s.style.left = px + 'px';
            requestAnimationFrame(moveTick);
        }
        moveTick();

        var launchDate = new Date('2026-03-11T22:23:00');

        function updateCounter() {
            var now = new Date();
            var elapsedMinutes = (now - launchDate) / 60000;
            var miles = elapsedMinutes / 13;
            var display = miles.toFixed(1).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            document.getElementById('stickman-counter').textContent =
                'Stickman has ran ' + display + ' miles since launch';
        }

        updateCounter();
        setInterval(updateCounter, 1000);

    </script>

  </body>
</html>
