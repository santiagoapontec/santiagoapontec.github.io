<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Post Title</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
    onload="renderMathInElement(document.body, {delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '$', right: '$', display: false}
    ]})">
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f5f0e8;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: #1a1a1a;
            padding: 60px 40px;
        }

        header {
            margin-bottom: 48px;
        }

        h1 {
            font-size: 22px;
            font-weight: 600;
        }

        header p {
            font-size: 13px;
            color: #999;
            font-style: italic;
            margin-top: 4px;
        }

        article {
            max-width: 760px;
            margin: 0 auto;
        }

        .post-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .post-header h2 {
            font-size: 26px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .post-subtitle {
            font-size: 14px;
            color: #999;
            font-style: italic;
            margin-bottom: 20px;
        }

        .post-subtitle:empty {
            display: none;
        }

        hr {
            border: none;
            border-top: 1px solid #ccc;
        }

        .post-body {
            margin-top: 28px;
        }

        .post-body p {
            font-size: 14px;
            line-height: 1.8;
            text-align: justify;
            margin-bottom: 16px;
        }

        pre {
            background-color: #ede8df;
            border-radius: 8px;
            padding: 24px;
            margin: 24px 0;
            overflow-x: auto;
        }

        code {
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #1a1a1a;
        }

        .image-row {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin: 24px 0;
        }

        .image-row figure {
            flex: 1;
            max-width: 480px;
        }

        .image-row figure:only-child {
            max-width: 600px;
            flex: none;
        }

        .image-row img {
            width: 100%;
            border-radius: 6px;
            display: block;
        }

        .post-body img {
            display: block;
            margin: 24px auto;
            max-width: 50%;
            border-radius: 6px;
        }

        blockquote {
            border-left: 3px solid #bbb;
            padding: 8px 0 8px 20px;
            margin: 24px 0;
            color: #555;
            font-style: italic;
            font-size: 14px;
            line-height: 1.7;
        }

        ul {
            list-style: disc;
            padding-left: 24px;
            margin: 16px 0;
        }

        ul li {
            font-size: 14px;
            line-height: 1.8;
            margin-bottom: 4px;
        }

        ol {
            list-style: none;
            counter-reset: item;
            padding-left: 40px;
            margin: 16px 0;
        }

        ol li {
            counter-increment: item;
            font-size: 14px;
            line-height: 1.8;
            margin-bottom: 8px;
            position: relative;
        }

        ol li::before {
            content: counter(item) ")";
            position: absolute;
            left: -32px;
            color: #1a1a1a;
        }

        footer {
            text-align: center;
            margin-top: 60px;
            font-size: 13px;
        }

        footer a {
            color: #1a1a1a;
        }
    </style>

  </head>
  <body>
    <header>
        <h1><a href="../learning.html" style="color: inherit; text-decoration: none;">Learning</a></h1>
        <p>Study journals for things I've learnt / I'm learning</p>
    </header>

    <article>
        <div class="post-header">
            <h2>Work and Energy</h2>
            <p class="post-subtitle"></p>
            <hr>
        </div>

        <div class="post-body">
            <p>Work is defined as force applied over a distance:</p>
<p>$W = F \cdot d \cdot \cos(\theta)$</p>
<p>Kinetic energy is the energy of motion:</p>
<p>$KE = \frac{1}{2}mv^2$</p>
<p>And the work-energy theorem states:</p>
<p>$W = \Delta KE$</p>
<p><img src="../images/work-energy.png" alt="Energy Diagram"></p>

        </div>
    </article>

    <footer>
        <a href="../index.html">Home</a>
    </footer>

  </body>
</html>
