            opacity: 0.6;
        }

        .post-list li a {
        display: flex;
        width: 100%;
        gap: 8px;
        align-items: baseline;
        text-decoration: none;
        color: inherit;
        }

        li.month-end {
            border-bottom: 1px solid #999;
        }

        .title {
            font-size: 14px;
        }

        .date {
            margin-left: auto;
            font-size: 13px;
            color: #888;
        }

        footer {
            text-align: center;
            margin-top: 60px;
            font-size: 13px;
        }

        footer a {
            color: #1a1a1a;

</style>
