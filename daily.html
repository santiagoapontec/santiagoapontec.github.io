<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f5f0e8;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: #1a1a1a;
            padding: 60px 40px;
        }

        header {
            margin-bottom: 40px;
        }

        h1 {
            font-size: 22px;
            font-weight: 600;
        }

        header p {
            font-size: 13px;
            color: #999;
            font-style: italic;
            margin-top: 4px;
        }

        main {
            max-width: 760px;
            margin: 0 auto;
        }

        .calendar-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            margin-bottom: 40px;
        }

        .year-heading {
            font-size: 20px;
            font-weight: 600;
        }

        .arrow {
            background: none;
            border: none;
            font-size: 28px;
            color: #aaa;
            cursor: pointer;
            padding: 0 8px;
            line-height: 1;
        }

        .arrow:hover {
            color: #1a1a1a;
        }

        .calendar-pages {
            position: relative;
        }

        .calendar-page {
            display: none;
        }

        .calendar-page.active {
            display: block;
        }

        .month-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 48px 40px;
        }

        .month h3 {
            font-size: 15px;
            font-weight: 400;
            font-style: italic;
            color: #aaa;
            text-align: center;
            margin-bottom: 16px;
        }

        .month-days {
            width: 100%;
            border-collapse: collapse;
        }

        .month-days th {
            font-size: 11px;
            color: #bbb;
            font-weight: 400;
            text-align: center;
            padding-bottom: 8px;
        }

        .month-days td {
            text-align: center;
            padding: 4px 0;
            font-size: 13px;
            color: #555;
            width: 36px;
            height: 32px;
            position: relative;
        }

        .month-days td.today {
            font-weight: 600;
            color: #1a1a1a;
        }

        .month-days td.has-entry {
            cursor: pointer;
        }

        .month-days td.has-entry span {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            background-color: #c8c2b8;
            border-radius: 50%;
            color: #1a1a1a;
        }

        footer {
            text-align: center;
            margin-top: 60px;
            font-size: 13px;
        }

        footer a {
            color: #1a1a1a;
        }
    </style>

  </head>
  <body>
    <header>
        <h1>Daily</h1>
        <p>An actual record so that I can't lie on podcasts down the road...</p>
    </header>

    <main>
        <div class="calendar-nav">
            <button class="arrow left" onclick="changePage(-1)">&#8249</button>
            <div class="year-heading">2026</div>
            <button class="arrow right" onclick="changePage(1)">&#8250</button>
        </div>

        <div class="calendar-pages">

            <div class="calendar-page active">
                <div class="month-grid">
                    <div class="month" id="jan"></div>
                    <div class="month" id="feb"></div>
                    <div class="month" id="mar"></div>
                    <div class="month" id="apr"></div>
                </div>
            </div>

            <div class="calendar-page active">
                <div class="month-grid">
                    <div class="month" id="may"></div>
                    <div class="month" id="jun"></div>
                    <div class="month" id="jul"></div>
                    <div class="month" id="aug"></div>
                </div>
            </div>

            <div class="calendar-page active">
                <div class="month-grid">
                    <div class="month" id="sep"></div>
                    <div class="month" id="oct"></div>
                    <div class="month" id="nov"></div>
                    <div class="month" id="dec"></div>
                </div>
            </div>

        </div>
    </main>

    <footer>
        <a href="index.html">Home</a>
    </footer>

    <script>
        var currentPage = 0;
        var today = new Date();

        // Days that have entries: add dates as 'YYYY-M-D'
        var entries = ['2026-3-14', '2026-3-15', '2026-3-16', '2026-3-17', '2026-3-24', '2026-3-25', '2026-3-26', '2026-3-27', '2026-3-28', '2026-3-29'];

        var months = [
            { id: 'jan', name: 'Jan', month: 0 },
            { id: 'feb', name: 'Feb', month: 1 },
            { id: 'mar', name: 'Mar', month: 2 },
            { id: 'apr', name: 'Apr', month: 3 },
            { id: 'may', name: 'May', month: 4 },
            { id: 'jun', name: 'Jun', month: 5 },
            { id: 'jul', name: 'Jul', month: 6 },
            { id: 'aug', name: 'Aug', month: 7 },
            { id: 'sep', name: 'Sep', month: 8 },
            { id: 'oct', name: 'Oct', month: 9 },
            { id: 'nov', name: 'Nov', month: 10 },
            { id: 'dec', name: 'Dec', month: 11 },
        ];

        function buildCalendar(year, monthIndex, containerId) {
            var container = document.getElementById(containerId);
            var firstDay = new Date(year, monthIndex, 1).getDay();
            var daysInMonth = new Date(year, monthIndex + 1, 0).getDate();

            var html = '<h3>' + months[monthIndex].name + '</h3>';
            html += '<table class="month-days">';
            html += '<thead><tr>';
            ['SUN','MON','TUE','WED','THU','FRI','SAT'].forEach(function(d) {
            html += '<th>' + d + '</th>';
            });
            html += '</tr></thead><tbody><tr>';

            for (var i = 0; i < firstDay; i++) {
            html += '<td></td>';
            }

            var dayCount = firstDay;
            for (var day = 1; day <= daysInMonth; day++) {
            var dateKey = year + '-' + (monthIndex + 1) + '-' + day;
            var isToday = (today.getFullYear() === year && today.getMonth() === monthIndex && today.getDate() === day);
            var hasEntry = entries.indexOf(dateKey) !== -1;

            var classes = [];
            if (isToday) classes.push('today');
            if (hasEntry) classes.push('has-entry');

            var classAttr = classes.length ? ' class="' + classes.join(' ') + '"' : '';

            if (hasEntry) {
                html += '<td' + classAttr + ' onclick="window.location=\'daily-posts/' + dateKey + '.html\'"style="cursor:pointer"><span>' + day + '</span></td>';
            } else {
                html += '<td' + classAttr + '>' + day + '</td>';
            }

            dayCount++;
            if (dayCount % 7 === 0 && day < daysInMonth) {
                html += '</tr><tr>';
            }
            }

            html += '</tr></tbody></table>';
            container.innerHTML = html;
        }

        function buildAll() {
            months.forEach(function(m) {
            buildCalendar(2026, m.month, m.id);
            });
        }

        function changePage(direction) {
            var pages = document.querySelectorAll('.calendar-page');
            pages[currentPage].classList.remove('active');
            currentPage = Math.max(0, Math.min(2, currentPage + direction));
            pages[currentPage].classList.add('active');
        }

        buildAll();
        var pages = document.querySelectorAll('.calendar-page');
        pages.forEach(function(page) {
            page.classList.remove('active');
        });
        pages[0].classList.add('active');

    </script>

  </body>
</html>
